apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-pipe-config
  namespace: rag-pipe
data:
  PORT: "8080"
  PIPE_PORT: "8082"
  INFERENCE_PORT: "8081"
  POSTGRES_DB: "rag_db"
  POSTGRES_USER: "postgres"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "documents"
  MINIO_USE_SSL: "false"
  NATS_URL: "nats://nats:4222"
  NATS_STREAM: "RAG_PIPE"
  NATS_TOPIC: "documents.ingested"
  NATS_SUBJECT: "documents.ingested"
  NATS_CONSUMER: "pipe_workers"
  NATS_DLQ_SUBJECT: "documents.dlq"
  NATS_MAX_DELIVERIES: "3"
  WORKER_CONCURRENCY: "10"
  EMBEDDING_DIMENSION: "2048"
  EMBEDDING_MODEL_VERSION: "nvidia/llama-nemotron-embed-vl-1b-v2:free"
  OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1/embeddings"
  REDIS_URL: "redis:6379"
  CACHE_WARMUP_LIMIT: "10000"
  OTEL_SERVICE_NAME: "rag-pipe-system"
  OTEL_COLLECTOR_URL: "otel-collector:4318"
---
apiVersion: v1
kind: Secret
metadata:
  name: rag-pipe-secrets
  namespace: rag-pipe
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgrespassword"
  DATABASE_DSN: "postgres://postgres:postgrespassword@postgres:5432/rag_db?sslmode=disable"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
  OPENROUTER_API_KEY: "BuyYourOwnKey!!!!!!!"

apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: rag-pipe
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: ingestion
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: rag-pipe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      initContainers:
        - name: migration-sidecar
          image: migrate/migrate:v4.17.0
          command:
            - /migrate
            - -path=/migrations/ingestion
            - -database=$(DATABASE_DSN)
            - up
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: rag-pipe-secrets
                  key: DATABASE_DSN
      containers:
        - name: ingestion
          image: ghcr.io/oyamo/ingestion:v0.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: rag-pipe-config
            - secretRef:
                name: rag-pipe-secrets
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: otel-sidecar
          image: otel/opentelemetry-collector-contrib:0.98.0
          args: [ "--config=/etc/otelcol-contrib/config.yaml" ]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingestion-hpa
  namespace: rag-pipe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingestion
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

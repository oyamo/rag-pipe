apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: rag-pipe
spec:
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  selector:
    app: inference
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: rag-pipe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: inference
          image: ghcr.io/oyamo/inference:v0.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: rag-pipe-config
            - secretRef:
                name: rag-pipe-secrets
          ports:
            - containerPort: 8081
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inference-hpa
  namespace: rag-pipe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

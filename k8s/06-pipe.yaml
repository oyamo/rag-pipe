apiVersion: v1
kind: Service
metadata:
  name: pipe
  namespace: rag-pipe
spec:
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  selector:
    app: pipe
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipe
  namespace: rag-pipe
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pipe
  template:
    metadata:
      labels:
        app: pipe
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: pipe
          image: ghcr.io/oyamo/pipe:v0.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: rag-pipe-config
            - secretRef:
                name: rag-pipe-secrets
          ports:
            - containerPort: 8082
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1500m
              memory: 1Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pipe-hpa
  namespace: rag-pipe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pipe
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

name: Build and Push Docker Images to GHCR

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-push:
    name: Build and Push Microservices to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Ingestion Image
        uses: docker/build-push-action@v5
        with:
          context: ./ingestion
          file: ./ingestion/Dockerfile
          push: true
          tags: |
            ghcr.io/oyamo/ingestion:latest
            ghcr.io/oyamo/ingestion:v0.1
            ghcr.io/oyamo/ingestion:${{ github.sha }}

      - name: Build and Push Inference Image
        uses: docker/build-push-action@v5
        with:
          context: ./inference
          file: ./inference/Dockerfile
          push: true
          tags: |
            ghcr.io/oyamo/inference:latest
            ghcr.io/oyamo/inference:v0.1
            ghcr.io/oyamo/inference:${{ github.sha }}

      - name: Build and Push Pipe Image
        uses: docker/build-push-action@v5
        with:
          context: ./pipe
          file: ./pipe/Dockerfile
          push: true
          tags: |
            ghcr.io/oyamo/pipe:latest
            ghcr.io/oyamo/pipe:v0.1
            ghcr.io/oyamo/pipe:${{ github.sha }}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  nats:
    image: nats:2.10-alpine
    command: "-js -sd /data"
    ports:
      - "4222:4222"
      - "8222:8222"

  tempo:
    image: grafana/tempo:latest
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - tempodata:/var/tempo
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "3200:3200" # Tempo HTTP API

  prometheus:
    image: prom/prometheus:latest
    command: [ "--config.file=/etc/prometheus/prometheus.yml" ]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:latest
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    ports:
      - "3100:3100"
    volumes:
      - lokidata:/loki

  promtail:
    image: grafana/promtail:latest
    command: [ "-config.file=/etc/promtail/promtail.yml" ]
    volumes:
      - ./promtail.yml:/etc/promtail/promtail.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000" # Grafana Web UI
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana-datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml
      - ./grafana-dashboard-provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml
      - ./grafana-dashboard-rag.json:/etc/grafana/provisioning/dashboards/rag_overview.json
    depends_on:
      - tempo
      - prometheus
      - loki

  liquibase-migration:
    image: liquibase/liquibase:4.27.0
    working_dir: /liquibase/changelog
    command:
      - --changelog-file=db.changelog-master.yaml
      - --url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - --username=${POSTGRES_USER}
      - --password=${POSTGRES_PASSWORD}
      - --driver=org.postgresql.Driver
      - update
    volumes:
      - ./migrations:/liquibase/changelog
    depends_on:
      postgres:
        condition: service_healthy

  ingestion:
    image: ghcr.io/oyamo/ingestion:v0.1
    environment:
      PORT: ${PORT}
      DATABASE_DSN: ${DATABASE_DSN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      NATS_URL: ${NATS_URL}
      NATS_TOPIC: ${NATS_TOPIC}
      OTEL_SERVICE_NAME: ingestion-service
      OTEL_COLLECTOR_URL: tempo:4318
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      nats:
        condition: service_started
      tempo:
        condition: service_started
      liquibase-migration:
        condition: service_completed_successfully

  pipe:
    image: ghcr.io/oyamo/pipe:v0.1
    environment:
      PORT: ${PIPE_PORT}
      DATABASE_DSN: ${DATABASE_DSN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      NATS_URL: ${NATS_URL}
      NATS_STREAM: ${NATS_STREAM}
      NATS_SUBJECT: ${NATS_SUBJECT}
      NATS_CONSUMER: ${NATS_CONSUMER}
      NATS_DLQ_SUBJECT: ${NATS_DLQ_SUBJECT}
      NATS_MAX_DELIVERIES: ${NATS_MAX_DELIVERIES}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION}
      EMBEDDING_MODEL_VERSION: ${EMBEDDING_MODEL_VERSION}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      OTEL_SERVICE_NAME: pipe-service
      OTEL_COLLECTOR_URL: tempo:4318
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      nats:
        condition: service_started
      tempo:
        condition: service_started
      liquibase-migration:
        condition: service_completed_successfully

  inference:
    image: ghcr.io/oyamo/inference:v0.1
    environment:
      PORT: ${INFERENCE_PORT}
      DATABASE_DSN: ${DATABASE_DSN}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION}
      EMBEDDING_MODEL_VERSION: ${EMBEDDING_MODEL_VERSION}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      OTEL_SERVICE_NAME: inference-service
      OTEL_COLLECTOR_URL: tempo:4318
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      tempo:
        condition: service_started
      liquibase-migration:
        condition: service_completed_successfully

volumes:
  pgdata:
  miniodata:
  tempodata:
  prometheusdata:
  lokidata:
  grafanadata:
